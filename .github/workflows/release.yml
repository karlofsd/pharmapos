name: Release

on:
    push:
        tags:
            - "v*"

jobs:
    build-windows:
        runs-on: windows-latest
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "yarn"

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Build Windows
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VITE_DECOLECTA_API_KEY: ${{ secrets.VITE_DECOLECTA_API_KEY }}
              run: yarn build:win

    build-mac:
        runs-on: macos-latest
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "yarn"

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Build macOS
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VITE_DECOLECTA_API_KEY: ${{ secrets.VITE_DECOLECTA_API_KEY }}
              run: yarn build:mac

    build-linux:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "yarn"

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y rpm libusb-1.0-0-dev

            - name: Build Linux
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VITE_DECOLECTA_API_KEY: ${{ secrets.VITE_DECOLECTA_API_KEY }}
              run: yarn build:linux
